<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
body{
background:#0f172a;
font-family:Inter,sans-serif;
}

.gradient-text{
background: linear-gradient(135deg,#0ea5e9,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen text-slate-200">

<div class="text-center max-w-lg px-6">

<div class="text-8xl font-bold gradient-text mb-6">
404
</div>

<h1 class="text-3xl font-bold mb-4">
Page Not Found
</h1>

<p class="text-slate-400 mb-8">
Oops! The page you're looking for doesn't exist or was moved.
</p>

<div class="flex justify-center gap-4">

<button onclick="history.back()" 
class="px-6 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 transition">
<i class="fa-solid fa-arrow-left mr-2"></i>
Back
</button>

<a href="index.html"
class="px-6 py-3 rounded-xl bg-gradient-to-r from-brand-500 to-purple-600 text-white font-semibold hover:opacity-90 transition">
<i class="fa-solid fa-house mr-2"></i>
Go Home
</a>

</div>

</div>

</body>
</html>
